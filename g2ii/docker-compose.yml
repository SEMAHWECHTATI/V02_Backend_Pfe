version: '3.8'

services:

  ma-base-db:
    image: postgres:17
    container_name: postgres-g2ii-container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: g2ii_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-app:
    image: g2ii-backend-app:latest
    container_name: g2ii-app-container
    ports:
      - "8070:8070"
    depends_on:
      ma-base-db:
        condition: service_healthy
    environment:
      # ✅ Les variables d'environnement écrasent application.yml
      SPRING_DATASOURCE_URL: jdbc:postgresql://ma-base-db:5432/g2ii_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_JPA_SHOW_SQL: "true"
    restart: on-failure

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-container
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - ma-base-db

volumes:
  postgres_data: