      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: INFO
    com.sagem.g2ii: DEBUG
  file:
    name: /app/logs/g2ii.log

# JWT Configuration
app:
  jwt:
    secret: mySecretKeyForJWTTokenGenerationThatMustBeAtLeast256Bits
    expiration: 86400000  # 24 heures en millisecondes

