  mail:
    host: smtp.gmail.com
    port: 587
    username: it.informatique.service@gmail.com   # Remplacez par votre vraie adresse
    password: ztcf dhkn kjee hfve # ⚠️ Lisez la note importante ci-dessous !
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    # URL pour une base en mémoire. 'testdb' est le nom de la base.
    url: jdbc:h2:mem:db_pfe
    driver-class-name: org.h2.Driver
    username: sameh
    password:

  h2:
    console:
        # Active l'interface graphique à l'adresse http://localhost:8080/h2-console
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      # J'ai remis "update" au lieu de "create-drop" pour que vous ne perdiez pas
